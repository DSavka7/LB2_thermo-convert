{% extends "base.html" %}

{% block content %}
<div class="card p-4 shadow-lg bg-secondary text-light" style="width: 400px;">

    <h3 class="text-center mb-3">Конвертер температур</h3>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
        <input type="number" step="any" name="celsius"
               value="{{ celsius }}"
               class="form-control mb-3"
               placeholder="Введіть °C"
               required>

        <button class="btn btn-warning w-100">Конвертувати</button>
    </form>

    {% if result %}
        <div class="alert alert-info mt-3 text-center">
            {{ result.celsius }} °C = <strong>{{ result.fahrenheit }} °F</strong>
        </div>
    {% endif %}

    <a href="/history" class="btn btn-outline-light mt-3">
        Журнал ({{ history_count }})
    </a>

</div>
{% endblock %}

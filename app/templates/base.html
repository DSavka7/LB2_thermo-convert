<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThermoConvert – {% block title %}Конвертер температур{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="page">

   <header class="site-header">
    <a href="/" class="brand" style="text-decoration:none;">
        <div class="brand-logo">🌡</div>
        <div>
            <span class="brand-name">ThermoConvert</span>
            <span class="brand-sub">FastAPI · Lab Work</span>
        </div>
    </a>

    <div class="nav-pill">
        {% block nav_extra %}{% endblock %}

        <a href="/history">📋 Журнал</a>

        <!-- Адмін-посилання видно тільки адміністраторам -->
        {% if current_user and current_user.role == 'admin' %}
            <a href="/admin" style="background: #f97316; color: white; border-color: #f97316;">
                ⚙️ Адмін-панель
            </a>
        {% endif %}

        <a href="/auth/logout">🚪 Вийти</a>
    </div>
</header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
        ThermoConvert &mdash; FastAPI Lab &mdash; {{ 2025 }}
    </footer>

</div>
</body>
</html>

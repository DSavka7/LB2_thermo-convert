{% extends "base.html" %}

{% block content %}
<div class="card p-4 shadow-lg bg-secondary text-light w-75">

    <h3 class="text-center mb-4">Журнал конвертацій</h3>

    {% if history %}
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Час</th>
                    <th>°C</th>
                    <th>°F</th>
                </tr>
            </thead>
            <tbody>
                {% for item in history %}
                <tr>
                    <td>{{ item.timestamp }}</td>
                    <td>{{ item.celsius }}</td>
                    <td>{{ item.fahrenheit }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <form method="post" action="/history/clear">
            <button class="btn btn-danger">Очистити</button>
        </form>

    {% else %}
        <p class="text-center text-muted">Журнал порожній</p>
    {% endif %}

    <a href="/" class="btn btn-outline-light mt-3">Назад</a>

</div>
{% endblock %}
